<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Glassmorphic Scientific Calculator</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Animated background glowing shapes */
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-25px) scale(1.05); }
        }
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0px) scale(1.05); }
            50% { transform: translateY(25px) scale(1); }
        }
        .glow-sphere-1 {
            animation: float-slow 16s ease-in-out infinite;
        }
        .glow-sphere-2 {
            animation: float-reverse 20s ease-in-out infinite;
        }
        
        /* Smooth active press click scaling */
        .btn-active-animation {
            transform: scale(0.92);
            filter: brightness(0.95);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
            transition: all 0.05s ease;
        }

        /* Operator active ring glow style */
        .operator-active {
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.35);
            border-color: rgba(251, 146, 60, 0.5) !important;
            transform: scale(0.95);
            filter: brightness(0.95);
        }
    </style>
</head>

<body class="relative flex items-center justify-center min-h-screen bg-slate-50 text-slate-800 p-4 select-none">

    <!-- Glowing Background Decorative Pastel Auras (Light Mode) -->
    <div class="glow-sphere-1 absolute top-[-10%] left-[-10%] w-[550px] h-[550px] bg-purple-250/20 rounded-full blur-[130px] pointer-events-none"></div>
    <div class="glow-sphere-2 absolute bottom-[-10%] right-[-10%] w-[550px] h-[550px] bg-amber-200/15 rounded-full blur-[130px] pointer-events-none"></div>
    <div class="absolute top-[35%] right-[25%] w-[400px] h-[400px] bg-indigo-200/10 rounded-full blur-[110px] pointer-events-none"></div>

    <!-- Calculator Main Container Card (Premium Soft White Glassmorphic) -->
    <div id="calculator-card" class="relative bg-white/80 backdrop-blur-3xl border border-white/90 shadow-[0_30px_70px_rgba(0,0,0,0.08),inset_0_1px_1px_rgba(255,255,255,0.8)] rounded-[32px] p-6 w-full max-w-sm flex flex-col gap-4 z-10 transition-all duration-500 ease-in-out">
        
        <!-- Premium Standard vs Scientific Mode Toggle -->
        <div class="flex items-center justify-between px-2 py-1 bg-slate-100/70 border border-slate-200/30 rounded-full select-none">
            <span class="text-slate-400 text-[10px] font-bold uppercase tracking-widest pl-3">Mode</span>
            <div class="flex bg-white rounded-full p-1 shadow-[0_1px_3px_rgba(0,0,0,0.05)] border border-slate-200/40">
                <button id="mode-standard" class="px-4 py-1 text-xs font-semibold rounded-full cursor-pointer transition-all duration-250 bg-gradient-to-br from-indigo-500 to-purple-650 text-white shadow-[0_2px_8px_rgba(99,102,241,0.2)]">Standard</button>
                <button id="mode-scientific" class="px-4 py-1 text-xs font-semibold rounded-full cursor-pointer transition-all duration-250 text-slate-400 hover:text-slate-800">Scientific</button>
            </div>
        </div>

        <!-- Premium Dual-Line Display Block (Soft Slate Grey Screen) -->
        <div class="relative bg-slate-50/90 rounded-2xl p-5 flex flex-col justify-end items-end h-36 border border-slate-100/50 shadow-[inset_0_2px_8px_rgba(0,0,0,0.03)]">
            <!-- Rad/Deg indicator pill -->
            <div id="angle-indicator" class="absolute top-4 left-4 px-2 py-0.5 text-[9px] font-bold tracking-widest text-emerald-600 bg-emerald-50 rounded border border-emerald-200 shadow-sm hidden">DEG</div>
            <div id="history-display" class="text-slate-400 text-sm font-medium tracking-wide min-h-[20px] mb-1 select-none w-full text-right overflow-hidden whitespace-nowrap text-ellipsis"></div>
            <div id=" " class="text-slate-800 text-5xl font-light tracking-tight truncate w-full text-right select-all transition-all duration-100">0</div>
        </div>

        <!-- Panels Container (Standard and Scientific Side-by-Side) -->
        <div class="flex flex-col md:flex-row gap-4 transition-all duration-500 ease-in-out overflow-hidden">
            
            <!-- Scientific Panel (Left-aligned, dynamically toggled) -->
            <div id="scientific-panel" class="hidden grid-cols-5 gap-2.5 transition-all duration-300 opacity-0 scale-95 w-full md:w-[390px] shrink-0">
                <!-- Row 1 -->
                <button data-scientific="(" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">(</button>
                <button data-scientific=")" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">)</button>
                <button id="btn-angle-toggle" class="col-span-2 p-3.5 bg-slate-100/45 hover:bg-slate-200/55 active:bg-slate-300/65 text-emerald-600 rounded-xl text-xs font-bold border border-slate-200/20 transition-all duration-150 cursor-pointer">Rad ⇄ Deg</button>
                <button data-operator="^" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">xʸ</button>

                <!-- Row 2 -->
                <button data-scientific="sin" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">sin</button>
                <button data-scientific="cos" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">cos</button>
                <button data-scientific="tan" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">tan</button>
                <button data-scientific="sqr" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">x²</button>
                <button data-scientific="sqrt" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">√</button>

                <!-- Row 3 -->
                <button data-scientific="asin" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-[11px] font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">asin</button>
                <button data-scientific="acos" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-[11px] font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">acos</button>
                <button data-scientific="atan" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-[11px] font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">atan</button>
                <button data-scientific="cube" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">x³</button>
                <button data-scientific="recip" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-xs font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">1/x</button>

                <!-- Row 4 -->
                <button data-scientific="pi" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">π</button>
                <button data-scientific="e" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">e</button>
                <button data-scientific="ln" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">ln</button>
                <button data-scientific="log" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">log</button>
                <button data-scientific="tenPower" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-[11px] font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">10ˣ</button>

                <!-- Row 5 -->
                <button data-scientific="ePower" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-xs font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">eˣ</button>
                <button data-scientific="abs" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">|x|</button>
                <button data-scientific="fact" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-sm font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">x!</button>
                <button data-operator="mod" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-slate-650 rounded-xl text-xs font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">mod</button>
                <button data-scientific="rand" class="p-3.5 bg-slate-100/40 hover:bg-slate-200/50 active:bg-slate-300/60 text-indigo-600 rounded-xl text-xs font-semibold border border-slate-200/20 transition-all duration-150 cursor-pointer">Rand</button>
            </div>

            <!-- Standard Panel (Right-aligned, fully responsive) -->
            <div id="standard-panel" class="grid grid-cols-4 gap-3 w-full shrink-0">
                <!-- Row 1: Actions & Top Operations -->
                <button data-action="clear" class="p-6 bg-slate-100/60 hover:bg-slate-200/60 active:bg-slate-300/70 text-indigo-650 rounded-2xl text-xl font-semibold border border-slate-250/20 transition-all duration-150 cursor-pointer">AC</button>
                <button data-action="negate" class="p-6 bg-slate-100/60 hover:bg-slate-200/60 active:bg-slate-300/70 text-indigo-650 rounded-2xl text-xl font-semibold border border-slate-250/20 transition-all duration-150 cursor-pointer">+/-</button>
                <button data-action="percent" class="p-6 bg-slate-100/60 hover:bg-slate-200/60 active:bg-slate-300/70 text-indigo-650 rounded-2xl text-xl font-semibold border border-slate-250/20 transition-all duration-150 cursor-pointer">%</button>
                <button data-operator="/" class="p-6 bg-gradient-to-br from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-450 active:from-amber-600 active:to-orange-600 text-white rounded-2xl text-2xl font-semibold border border-orange-400/20 shadow-[0_4px_12px_rgba(249,115,22,0.1)] transition-all duration-150 cursor-pointer">÷</button>

                <!-- Row 2: 7, 8, 9, x -->
                <button data-number="7" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">7</button>
                <button data-number="8" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">8</button>
                <button data-number="9" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">9</button>
                <button data-operator="*" class="p-6 bg-gradient-to-br from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-450 active:from-amber-600 active:to-orange-600 text-white rounded-2xl text-2xl font-semibold border border-orange-400/20 shadow-[0_4px_12px_rgba(249,115,22,0.1)] transition-all duration-150 cursor-pointer">×</button>

                <!-- Row 3: 4, 5, 6, - -->
                <button data-number="4" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">4</button>
                <button data-number="5" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">5</button>
                <button data-number="6" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">6</button>
                <button data-operator="-" class="p-6 bg-gradient-to-br from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-450 active:from-amber-600 active:to-orange-600 text-white rounded-2xl text-2xl font-semibold border border-orange-400/20 shadow-[0_4px_12px_rgba(249,115,22,0.1)] transition-all duration-150 cursor-pointer">−</button>

                <!-- Row 4: 1, 2, 3, + -->
                <button data-number="1" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">1</button>
                <button data-number="2" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">2</button>
                <button data-number="3" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">3</button>
                <button data-operator="+" class="p-6 bg-gradient-to-br from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-450 active:from-amber-600 active:to-orange-600 text-white rounded-2xl text-2xl font-semibold border border-orange-400/20 shadow-[0_4px_12px_rgba(249,115,22,0.1)] transition-all duration-150 cursor-pointer">+</button>

                <!-- Row 5: 0, ., = -->
                <button data-number="0" class="col-span-2 p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] text-left pl-9 transition-all duration-150 cursor-pointer">0</button>
                <button data-action="decimal" class="p-6 bg-white hover:bg-slate-50 active:bg-slate-150 text-slate-700 rounded-2xl text-2xl font-light border border-slate-200/20 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-all duration-150 cursor-pointer">.</button>
                <button data-action="equals" class="p-6 bg-gradient-to-br from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-450 active:from-emerald-600 active:to-teal-600 text-white rounded-2xl text-3xl font-bold border border-emerald-400/20 shadow-[0_4px_15px_rgba(16,185,129,0.15)] transition-all duration-150 cursor-pointer">=</button>
            </div>

        </div>

    </div>

    <!-- External JavaScript File Reference -->
    <script src="script.js"></script>
</body>

</html>
